<!DOCTYPE html>
<html>
<head>
    <title>HTML Lists</title>
</head>

<body>
    <h3>Ordered List</h3>
      <ol>
        <li>USA</li>
        <li>UK</li>
      </ol>

    <h3>Unordered List</h3>
    <ul>
      <li>Phoenix</li>
      <li>Austin</li>
    </ul>
    
    <!--Ordered lists with custom bullets-->
    <ol type="i">
      <li>USA</li>
      <li>UK</li>
    </ol>

    <!--Unordered list with custom bullets-->
    <ul type="square">
      <li>Phoenix</li>
      <li>Austin</li>
    </ul>

    <h3>Nested Lists</h3>
    <ol>
      <li>USA</li>
      <ul>
        <li>Austin</li>
        <li>LA</li>
      </ul>
    </ol>

    <h3>Definition List</h3>
    <dl>
      <dt>USA</dt> <!--title-->
      <dd>World's third largest country in terms of geographic area</dd> <!--data description-->
    </dl>

</body>
</html>
